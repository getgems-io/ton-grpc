[profile.default]
default-filter = 'not test(::integration::) - binary(=integration)'

[profile.ci]
fail-fast = false
default-filter = 'all()'
retries = { backoff = "fixed", count = 3, delay = "1s" }
slow-timeout = { period = "60s", terminate-after = 1 }

[test-groups]
integration = { max-threads = 2 }

[[profile.ci.overrides]]
platform = 'cfg(target_os = "macos")'
default-filter = 'not test(::integration::) - binary(=integration)'

[[profile.ci.overrides]]
filter = 'test(::integration::) | binary(=integration)'
test-group = 'integration'
