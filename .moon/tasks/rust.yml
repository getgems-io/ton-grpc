$schema: '../cache/schemas/tasks.json'

inheritedBy:
  toolchain: 'rust'
  layer:
    - 'application'
    - 'library'
    - 'tool'

fileGroups:
  sources:
    - 'build.rs'
    - 'src/**/*'
    - 'Cargo.toml'
  tests:
    - 'benches/**/*'
    - 'tests/**/*'

tasks:
  build:
    command: 'cargo build -j 4'
    deps:
      - '^:build'
    inputs:
      - '@group(sources)'
    env:
      RUSTC_WRAPPER: 'sccache'
      CMAKE_C_COMPILER_LAUNCHER: 'sccache'
      CMAKE_CXX_COMPILER_LAUNCHER: 'sccache'
  check:
    command: 'cargo check'
    inputs:
      - '@group(sources)'
    deps:
      - '^:check'
    env:
      RUSTC_WRAPPER: 'sccache'
      CMAKE_C_COMPILER_LAUNCHER: 'sccache'
      CMAKE_CXX_COMPILER_LAUNCHER: 'sccache'
      TON_SKIP_BUILD: 'true'
  format:
    command: 'cargo fmt --check'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
    env:
      RUSTC_WRAPPER: 'sccache'
      CMAKE_C_COMPILER_LAUNCHER: 'sccache'
      CMAKE_CXX_COMPILER_LAUNCHER: 'sccache'
  lint:
    command: 'cargo clippy'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
    deps:
      - '^:lint'
    env:
      RUSTC_WRAPPER: 'sccache'
      CMAKE_C_COMPILER_LAUNCHER: 'sccache'
      CMAKE_CXX_COMPILER_LAUNCHER: 'sccache'
      TON_SKIP_BUILD: 'true'
  test:
    command: 'cargo test -j 4'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
    deps:
      - '~:build'
    env:
      RUSTC_WRAPPER: 'sccache'
      CMAKE_C_COMPILER_LAUNCHER: 'sccache'
      CMAKE_CXX_COMPILER_LAUNCHER: 'sccache'
